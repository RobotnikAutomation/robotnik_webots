services:
  robotnik_webots_simulator:
    container_name: robotnik_webots_simulator
    image: robotnik_webots_simulation-robotnik_webots_simulation:latest
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        base_image: robotnik/ros
        ros_distro: jazzy
        image_base_version: 0.6.2
        ros_mirror: ros.mirror.robotnik.ws
    network_mode: host
    privileged: true
    runtime: nvidia
    environment:
      ROS_DOMAIN_ID: 0
      DISPLAY: ${DISPLAY}  # Forward X11 display
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics  # Allow GPU access
      NVIDIA_VISIBLE_DEVICES: all  # Expose all GPUs
    devices:
      - "/dev/dri:/dev/dri"  # Allow OpenGL rendering
      - /tmp/.X11-unix:/tmp/.X11-unix
  robotnik_webots_robot_spawner:
    container_name: robotnik_webots_robot_spawner
    image: robotnik_webots_robot_spawner-robotnik_webots_robot_spawner:latest
    network_mode: host
    privileged: true
    runtime: nvidia
    env_file:
      - env/robot.env
    environment:
      ROS_DOMAIN_ID: 0
      DISPLAY: ${DISPLAY}  # Forward X11 display
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics  # Allow GPU access
      NVIDIA_VISIBLE_DEVICES: all  # Expose all GPUs
      ROS_BU_LAUNCH: spawn_robot.launch.py robot:=$${ROBOT} robot_id:=$${ROBOT_ID} run_rviz:=$${RUN_RVIZ} mode:=$${MODE}
    devices:
      - "/dev/dri:/dev/dri"  # Allow OpenGL rendering
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      robotnik_webots_simulator:
        condition: service_healthy

    volumes:
      - ./entrypoint.sh:/usr/local/bin/ros_entrypoint.sh
   

